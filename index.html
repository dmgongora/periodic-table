<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Stories of Matter | Thermal States</title>
    <style>
        /* ... (previous root and grid styles) ... */
        :root { --cell-size: clamp(30px, 4.8vw, 62px); --gap: 3px; --bg: #0f172a; --text: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .dashboard { background: #1e293b; padding: 20px; border-radius: 16px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 1100px; }
        .slider-box { display: flex; align-items: center; gap: 10px; background: #0f172a; padding: 8px 14px; border-radius: 10px; }
        #pt-container { display: grid; grid-template-columns: repeat(18, var(--cell-size)); grid-template-rows: repeat(10, var(--cell-size)); gap: var(--gap); }
        .element { width: var(--cell-size); height: var(--cell-size); position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 0.4s ease; cursor: crosshair; background: #334155; }
        .element .sym { font-weight: 800; font-size: 1.1rem; }

        /* Thermal States */
        .state-solid { background: #475569 !important; color: white !important; }
        .state-liquid { background: #10b981 !important; color: white !important; }
        .state-gas { background: #f59e0b !important; color: black !important; }
        .state-plasma { background: #a855f7 !important; color: white !important; box-shadow: 0 0 10px #a855f7; z-index: 2; }
        
        /* ... (nation and gender colors as before) ... */
        .future-element { opacity: 0.05 !important; filter: grayscale(1); }
        #tooltip { position: fixed; background: #fff; color: #000; padding: 12px; border-radius: 8px; display: none; z-index: 1000; box-shadow: 0 20px 25px rgba(0,0,0,0.5); width: 240px; font-size: 0.8rem; }
    </style>
</head>
<body class="view-nation">
    <div class="dashboard">
        <!-- Controls row -->
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <div id="view-buttons">
                <button onclick="changeView('nation')">Nation</button>
                <button onclick="changeView('state')">Thermal State</button>
            </div>
            <div class="slider-box">
                <span>Temp: <strong id="temp-display">293 K</strong></span>
                <input type="range" id="temp-slider" min="0" max="100000" value="293" oninput="updateTemp(this.value)">
            </div>
            <div class="slider-box">
                <span>Year: <strong id="year-display">2024</strong></span>
                <input type="range" id="year-slider" min="1200" max="2024" value="2024" oninput="updateYear(this.value)">
            </div>
        </div>
        <div id="legend-container"></div>
    </div>
    <div id="pt-container"></div>
    <div id="tooltip"></div>

<script>
    let elements = [];
    let currentTemp = 293;
    let currentYear = 2024;
    let currentView = 'nation';

    async function loadData() {
        const response = await fetch('./data.json');
        elements = await response.json();
        renderTable();
        refreshUI();
    }

    function renderTable() {
        const container = document.getElementById('pt-container');
        elements.forEach(el => {
            const div = document.createElement('div');
            div.id = `el-${el.number}`;
            div.className = 'element';
            div.style.gridColumn = el.x;
            div.style.gridRow = el.y;
            div.innerHTML = `<span class="sym">${el.symbol}</span>`;
            
            div.onmouseover = (e) => showTooltip(el, e);
            div.onmouseout = () => document.getElementById('tooltip').style.display = 'none';
            container.appendChild(div);
        });
    }

    function updateTemp(v) { 
        currentTemp = v; 
        document.getElementById('temp-display').innerText = v + " K";
        refreshUI(); 
    }
    
    function updateYear(v) { 
        currentYear = v; 
        document.getElementById('year-display').innerText = v;
        refreshUI(); 
    }

    function showTooltip(el, e) {
        const tt = document.getElementById('tooltip');
        tt.style.display = 'block';
        tt.style.left = (e.clientX + 15) + 'px';
        tt.style.top = (e.clientY + 15) + 'px';

        const state = getState(el);
        const transition = getTransition(el);

        tt.innerHTML = `
            <b>${el.name}</b><br>
            Current State: <b style="text-transform:uppercase">${state}</b><br>
            ${transition ? `<i>Currently: ${transition}</i><br>` : ''}
            <hr>
            Melting: ${el.melting} K | Boiling: ${el.boiling} K<br>
            Plasma Threshold: ~${el.plasma} K
        `;
    }

    function getState(el) {
        if (currentTemp >= el.plasma) return "plasma";
        if (el.sublimes && currentTemp >= el.boiling) return "gas";
        if (currentTemp >= el.boiling) return "gas";
        if (currentTemp >= el.melting && !el.sublimes) return "liquid";
        return "solid";
    }

    function getTransition(el) {
        const t = parseInt(currentTemp);
        if (Math.abs(t - el.plasma) < 500) return "Ionization";
        if (Math.abs(t - el.boiling) < 50) return el.sublimes ? "Sublimation" : "Vaporization";
        if (Math.abs(t - el.melting) < 50 && !el.sublimes) return "Melting";
        return null;
    }

    function refreshUI() {
        elements.forEach(el => {
            const dom = document.getElementById(`el-${el.number}`);
            dom.classList.toggle('future-element', el.year > currentYear);
            
            if (currentView === 'state') {
                dom.classList.remove('state-solid', 'state-liquid', 'state-gas', 'state-plasma');
                dom.classList.add('state-' + getState(el));
            }
        });
    }

    loadData();
</script>
</body>
</html>
