<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Stories of Matter | Interactive Periodic Table</title>
    <style>
        :root {
            --cell-size: clamp(30px, 4.8vw, 62px);
            --gap: 3px;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --accent: #3b82f6;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg); color: var(--text);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        header { text-align: center; margin-bottom: 25px; }
        header h1 { margin: 0; font-size: 2rem; font-weight: 800; letter-spacing: -0.025em; }
        header p { opacity: 0.6; font-size: 0.95rem; margin-top: 5px; }

        /* Dashboard & Controls */
        .dashboard {
            background: var(--card-bg); padding: 20px; border-radius: 16px;
            margin-bottom: 30px; display: flex; flex-direction: column; gap: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 1100px;
        }

        .controls-row { display: flex; flex-wrap: wrap; gap: 20px; align-items: center; justify-content: space-between; }
        
        .btn-group { display: flex; background: #0f172a; padding: 4px; border-radius: 10px; }
        button { 
            background: transparent; color: #94a3b8; border: none; padding: 8px 16px; 
            cursor: pointer; transition: all 0.2s ease; font-size: 0.85rem; font-weight: 600; border-radius: 7px;
        }
        button.active { background: var(--accent); color: white; }

        .timeline-box { display: flex; align-items: center; gap: 12px; background: #0f172a; padding: 8px 16px; border-radius: 10px; }
        input[type=range] { cursor: pointer; accent-color: var(--accent); }

        /* Legend Area */
        #legend-container {
            display: flex; gap: 20px; justify-content: center; align-items: center;
            min-height: 30px; font-size: 0.8rem; border-top: 1px solid #334155; padding-top: 15px; flex-wrap: wrap;
        }
        .leg-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 14px; height: 14px; border-radius: 4px; }
        #abundance-gradient {
            width: 150px; height: 10px; border-radius: 5px;
            background: linear-gradient(to right, #1e293b, #3b82f6, #fde047);
        }

        /* Periodic Table Grid */
        #pt-container {
            display: grid;
            grid-template-columns: repeat(18, var(--cell-size));
            grid-template-rows: repeat(10, var(--cell-size));
            gap: var(--gap);
            margin-bottom: 50px;
        }

        .element {
            width: var(--cell-size); height: var(--cell-size);
            background: #334155; position: relative; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; border: 1px solid rgba(255,255,255,0.05);
        }

        .element:hover { transform: scale(1.1); z-index: 10; border-color: white; box-shadow: 0 10px 15px rgba(0,0,0,0.3); }

        .element .num { position: absolute; top: 2px; left: 4px; font-size: 0.6rem; opacity: 0.6; }
        .element .sym { font-weight: 800; font-size: 1.1rem; pointer-events: none;}
        .element .name { font-size: 0.45rem; text-transform: uppercase; opacity: 0.7; pointer-events: none; text-align: center; padding: 0 2px; }

        /* Perspective Colors - Nation */
        .view-nation .c-UK { background: #2563eb; }
        .view-nation .c-USA { background: #8b5cf6; }
        .view-nation .c-Germany { background: #f59e0b; color: #000; }
        .view-nation .c-Sweden { background: #eab308; color: #000; }
        .view-nation .c-France { background: #ef4444; }
        .view-nation .c-Russia { background: #10b981; }
        .view-nation .c-Ancient { background: #64748b; }
        .view-nation .c-Japan { background: #f43f5e; }
        .view-nation .c-Denmark, .view-nation .c-Austria, .view-nation .c-Spain, .view-nation .c-Finland, .view-nation .c-Switzerland, .view-nation .c-Mexico, .view-nation .c-Italy, .view-nation .c-India { background: #475569; }

        /* Perspective Colors - Gender */
        .view-gender .g-male { background: #1e40af; }
        .view-gender .g-female { background: #ec4899; box-shadow: 0 0 15px rgba(236, 72, 153, 0.6); z-index: 2; }
        .view-gender .g-team { background: #14b8a6; }
        .view-gender .g-ancient { background: #475569; }

        /* Timeline Opacity */
        .future-element { opacity: 0.05 !important; filter: grayscale(1) blur(1px); pointer-events: none; }

        /* Tooltip */
        #tooltip {
            position: fixed; background: #fff; color: #000; padding: 12px; 
            border-radius: 8px; pointer-events: none; display: none; z-index: 1000;
            box-shadow: 0 20px 25px rgba(0,0,0,0.5); width: 240px; font-size: 0.85rem; line-height: 1.5;
        }
    </style>
</head>
<body class="view-nation">

<header>
    <h1>The Stories of Matter</h1>
    <p>A human-centric history of the building blocks of existence.</p>
</header>

<div class="dashboard">
    <div class="controls-row">
        <div class="btn-group">
            <button id="btn-nation" class="active" onclick="changeView('nation')">Discovery Nation</button>
            <button id="btn-gender" onclick="changeView('gender')">Gender / Team</button>
            <button id="btn-abundance" onclick="changeView('abundance')">Earth Abundance</button>
        </div>

        <div class="timeline-box">
            <span style="font-size:0.8rem; font-weight:700; min-width: 90px;">Year: <span id="year-label" style="color:var(--accent)">2024</span></span>
            <input type="range" id="year-range" min="1650" max="2024" value="2024" oninput="updateTimeline(this.value)">
        </div>
    </div>
    <div id="legend-container"></div>
</div>

<div id="pt-container"></div>
<div id="tooltip"></div>

<script>
    let elements = [];
    const container = document.getElementById('pt-container');
    const tooltip = document.getElementById('tooltip');
    const yearLabel = document.getElementById('year-label');

    // 1. Fetch data from external JSON
    async function loadData() {
        try {
            const response = await fetch('./data.json');
            elements = await response.json();
            renderTable();
            updateLegend('nation');
        } catch (err) {
            console.error("Failed to load data.json. Ensure the file is in the same directory.", err);
            container.innerHTML = "<p style='grid-column: 1/18'>Error: Could not load data.json. Make sure you are using a local server (like Live Server or Python http.server).</p>";
        }
    }

    // 2. Build the Grid
    function renderTable() {
        container.innerHTML = '';
        elements.forEach(el => {
            const div = document.createElement('div');
            div.className = `element c-${el.nation} g-${el.gender}`;
            div.id = `el-${el.number}`;
            div.style.gridColumn = el.x;
            div.style.gridRow = el.y;
            
            div.innerHTML = `
                <span class="num">${el.number}</span>
                <span class="sym">${el.symbol}</span>
                <span class="name">${el.name}</span>
            `;

            // Interactions
            div.onmouseover = (e) => {
                tooltip.style.display = 'block';
                tooltip.innerHTML = `
                    <div style="font-weight:800; font-size:1.1rem; border-bottom:1px solid #eee; margin-bottom:8px; padding-bottom:4px;">${el.name} (${el.symbol})</div>
                    <b>Discoverer:</b> ${el.discoverer}<br>
                    <b>Nation:</b> ${el.nation} (${el.year < 0 ? 'Pre-history' : el.year})<br>
                    <b>Earth Abundance:</b> ${el.abundance > 0 ? el.abundance + ' ppm' : 'Trace / Synthetic'}
                `;
            };
            div.onmousemove = (e) => {
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
            };
            div.onmouseout = () => tooltip.style.display = 'none';

            container.appendChild(div);
        });
    }

    // 3. Perspective Logic
    function changeView(viewType) {
        document.body.className = `view-${viewType}`;
        document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${viewType}`).classList.add('active');

        elements.forEach(el => {
            const domEl = document.getElementById(`el-${el.number}`);
            if (viewType === 'abundance') {
                // Logarithmic heat map for ppm
                const ppm = el.abundance;
                const logVal = ppm > 0 ? Math.log10(ppm) : -5;
                const norm = (logVal + 5) / 11; // normalized 0 to 1
                domEl.style.backgroundColor = `hsl(210, 100%, ${15 + norm * 75}%)`;
                domEl.style.color = (15 + norm * 75) > 60 ? '#000' : '#fff';
            } else {
                domEl.style.backgroundColor = '';
                domEl.style.color = '';
            }
        });
        updateLegend(viewType);
    }

    // 4. Legend Logic
    function updateLegend(viewType) {
        const leg = document.getElementById('legend-container');
        leg.innerHTML = '';
        
        const config = {
            nation: { "UK": "#2563eb", "USA": "#8b5cf6", "Germany": "#f59e0b", "Sweden": "#eab308", "France": "#ef4444", "Russia": "#10b981", "Ancient": "#64748b", "Japan": "#f43f5e", "Other": "#475569" },
            gender: { "Male Discoverer": "#1e40af", "Female Discoverer": "#ec4899", "Research Team": "#14b8a6", "Pre-History": "#475569" }
        };

        if (viewType === 'abundance') {
            leg.innerHTML = `<span>Rare (Trace/Synthetic)</span><div id="abundance-gradient"></div><span>Common (O/Si/Al)</span>`;
        } else {
            Object.entries(config[viewType]).forEach(([label, color]) => {
                leg.innerHTML += `<div class="leg-item"><div class="dot" style="background:${color}"></div>${label}</div>`;
            });
        }
    }

    // 5. Timeline Logic
    function updateTimeline(year) {
        yearLabel.innerText = year;
        elements.forEach(el => {
            const domEl = document.getElementById(`el-${el.number}`);
            if (el.year > year) {
                domEl.classList.add('future-element');
            } else {
                domEl.classList.remove('future-element');
            }
        });
    }

    // Boot
    loadData();
</script>
</body>
</html>
