<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Stories of Matter: Complete 118 Table</title>
    <style>
        :root {
            --cell-size: clamp(30px, 4.8vw, 62px);
            --gap: 3px;
            --bg: #0f172a;
            --text: #f1f5f9;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg); color: var(--text);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        .dashboard {
            background: #1e293b; padding: 20px; border-radius: 16px;
            margin-bottom: 25px; display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 1200px;
        }

        .controls-row { display: flex; flex-wrap: wrap; gap: 20px; align-items: center; justify-content: space-between; }
        
        .btn-group { display: flex; background: #0f172a; padding: 4px; border-radius: 10px; }
        button { 
            background: transparent; color: #94a3b8; border: none; padding: 8px 16px; 
            cursor: pointer; transition: 0.3s; font-size: 0.85rem; font-weight: 600; border-radius: 7px;
        }
        button.active { background: #3b82f6; color: white; }

        #legend-container {
            display: flex; gap: 15px; justify-content: center; align-items: center;
            min-height: 25px; font-size: 0.75rem; border-top: 1px solid #334155; padding-top: 15px; flex-wrap: wrap;
        }
        .leg-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 12px; height: 12px; border-radius: 3px; }

        #pt-container {
            display: grid;
            grid-template-columns: repeat(18, var(--cell-size));
            grid-template-rows: repeat(10, var(--cell-size));
            gap: var(--gap);
        }

        .element {
            width: var(--cell-size); height: var(--cell-size);
            background: #334155; position: relative; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: all 0.4s ease;
            cursor: pointer;
        }

        .element .num { position: absolute; top: 2px; left: 4px; font-size: 0.6rem; opacity: 0.6; }
        .element .sym { font-weight: 800; font-size: 1.1rem; pointer-events: none;}
        .element .name { font-size: 0.4rem; text-transform: uppercase; opacity: 0.7; pointer-events: none; text-align: center; width: 90%; overflow: hidden;}

        /* VIEW: Discovery Nation Colors */
        .view-nation .c-UK { background: #2563eb; }
        .view-nation .c-USA { background: #8b5cf6; }
        .view-nation .c-Germany { background: #f59e0b; color: #000; }
        .view-nation .c-Sweden { background: #eab308; color: #000; }
        .view-nation .c-France { background: #ef4444; }
        .view-nation .c-Russia { background: #10b981; }
        .view-nation .c-Ancient { background: #64748b; }
        .view-nation .c-Japan { background: #f43f5e; }
        .view-nation .c-Other { background: #475569; }

        /* VIEW: Gender Colors */
        .view-gender .g-male { background: #1e40af; }
        .view-gender .g-female { background: #ec4899; box-shadow: 0 0 12px #ec4899; z-index: 5; }
        .view-gender .g-team { background: #14b8a6; }
        .view-gender .g-ancient { background: #475569; }

        #tooltip {
            position: fixed; background: #fff; color: #000; padding: 12px; 
            border-radius: 8px; pointer-events: none; display: none; z-index: 100;
            box-shadow: 0 20px 25px rgba(0,0,0,0.5); width: 220px; font-size: 0.8rem;
        }

        #abundance-gradient {
            width: 150px; height: 10px; border-radius: 5px;
            background: linear-gradient(to right, #1e293b, #3b82f6, #fde047);
        }
    </style>
</head>

        </div>
        <div style="display:flex; align-items:center; gap:12px;">

    </div>

</div>

const container = document.getElementById('pt-container');
const tooltip = document.getElementById('tooltip');

function init() {
    eData.forEach(el => {
        const div = document.createElement('div');
        div.className = `element c-${el[5]} g-${el[7]}`;
        div.id = `el-${el[0]}`;
        div.style.gridColumn = el[3];
        div.style.gridRow = el[4];
        div.setAttribute('data-year', el[6]);
        div.innerHTML = `<span class="num">${el[0]}</span><span class="sym">${el[1]}</span><span class="name">${el[2]}</span>`;
        
        div.onmouseover = (e) => {
            tooltip.style.display = 'block';
            tooltip.innerHTML = `
                <div style="font-weight:bold; font-size:1rem; border-bottom:1px solid #eee; margin-bottom:5px">${el[2]} (${el[1]})</div>
                <b>By:</b> ${el[8]}<br>
                <b>Nation:</b> ${el[5]} (${el[6] < 0 ? 'Ancient' : el[6]})<br>
                <b>Abundance:</b> ${el[9]} ppm
            `;
        };
        div.onmousemove = (e) => {
            tooltip.style.left = (e.clientX + 15) + 'px';
            tooltip.style.top = (e.clientY + 15) + 'px';
        };
        div.onmouseout = () => tooltip.style.display = 'none';
        container.appendChild(div);
    });
    updateLegend('nation');
}

function setView(view) {
    document.body.className = `view-${view}`;
    document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-${view}`).classList.add('active');

    eData.forEach(el => {
        const domEl = document.getElementById(`el-${el[0]}`);
        if (view === 'abundance') {
            const ppm = el[9];
            const logVal = ppm > 0 ? Math.log10(ppm) : -5;
            const norm = (logVal + 5) / 11; 
            domEl.style.backgroundColor = `hsl(215, 100%, ${15 + norm * 75}%)`;
            domEl.style.color = (15 + norm * 75) > 60 ? '#000' : '#fff';
        } else {
            domEl.style.backgroundColor = '';
            domEl.style.color = '';
        }
    });
    updateLegend(view);
}

function updateLegend(view) {
    const leg = document.getElementById('legend-container');
    leg.innerHTML = '';
    if (view === 'abundance') {
        leg.innerHTML = `<span>Rare (Trace)</span><div id="abundance-gradient"></div><span>Common (Si/O)</span>`;
    } else if (view === 'nation') {
        const nMap = { "UK":"#2563eb", "USA":"#8b5cf6", "Germany":"#f59e0b", "Sweden":"#eab308", "France":"#ef4444", "Russia":"#10b981", "Ancient":"#64748b", "Japan":"#f43f5e" };
        Object.entries(nMap).forEach(([k,v]) => leg.innerHTML += `<div class="leg-item"><div class="dot" style="background:${v}"></div>${k}</div>`);
    } else {
        const gMap = { "Individual Male":"#1e40af", "Individual Female":"#ec4899", "Modern Team":"#14b8a6", "Ancient":"#475569" };
        Object.entries(gMap).forEach(([k,v]) => leg.innerHTML += `<div class="leg-item"><div class="dot" style="background:${v}"></div>${k}</div>`);
    }
}

function updateYear(y) {
    document.getElementById('year-label').innerText = y;
    document.querySelectorAll('.element').forEach(el => {
        const year = parseInt(el.getAttribute('data-year'));
        el.style.opacity = (year > y) ? "0.05" : "1";
    });
}
